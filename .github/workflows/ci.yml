name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          XCODE_PATH="$(ls -1d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)"
          if [[ -z "${XCODE_PATH:-}" ]]; then
            echo "No Xcode installation found on runner." >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Verify Swift 6.1+ toolchain
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          VERSION_TUPLE="$(swift --version | sed -n 's/.*Swift version \([0-9][0-9]*\)\.\([0-9][0-9]*\).*/\1 \2/p' | head -n 1)"
          if [[ -z "${VERSION_TUPLE:-}" ]]; then
            echo "Unable to parse Swift version." >&2
            exit 1
          fi
          read -r SWIFT_MAJOR SWIFT_MINOR <<< "$VERSION_TUPLE"
          if (( SWIFT_MAJOR < 6 || (SWIFT_MAJOR == 6 && SWIFT_MINOR < 1) )); then
            echo "Swift 6.1+ is required for CI." >&2
            exit 1
          fi

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test
